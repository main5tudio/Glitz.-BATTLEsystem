<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#201E26">
    <title>Glitz Battle System</title>
    <style>
        /* CSS stays mostly the same - added hardware acceleration for A10 */
        body { margin: 0; overflow: hidden; background: #87CEEB; font-family: sans-serif; touch-action: none; -webkit-font-smoothing: antialiased; }
        canvas { display: block; width: 100vw; height: 100vh; }
        .overlay { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(20, 30, 40, 0.95); color: #fff; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; padding: 20px; box-sizing: border-box; }
        .hidden { display: none !important; }
        .draft-box { background: rgba(0,0,0,0.5); border: 2px solid #00ffcc; border-radius: 8px; padding: 15px; text-align: center; width: 90%; }
        .class-btn { background: #222; color: #fff; font-size: 13px; padding: 10px; margin: 4px; border: 2px solid #fff; border-radius: 5px; }
        #ui-layer { position: absolute; top: 10px; left: 10px; z-index: 10; font-size: 14px; color: #000; background: rgba(255,255,255,0.7); padding: 5px; border-radius: 4px; }
        .f-ui { position: absolute; transform: translate(-50%, -100%); pointer-events: none; z-index: 4; display: flex; flex-direction: column; align-items: center; }
        .bar-bg { width: 35px; height: 5px; background: #000; border: 1px solid #fff; border-radius:2px; }
        .bar-hp { height: 100%; background: #00cc44; transition: width 0.3s; }
        .pad { display: none; position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); z-index: 10; gap: 10px; }
        .abtn { padding: 15px 20px; font-weight: bold; border-radius: 8px; border: 2px solid #fff; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
</head>
<body>

    <div id="draft-screen" class="overlay">
        <h1>Vanguard Assembly</h1>
        <div class="draft-box">
            <h2 id="enemy-draft"></h2>
            <button class="class-btn" onclick="UI.draftUnit('infantry')">⚔️ Infantry</button>
            <button class="class-btn" onclick="UI.draftUnit('bowman')">🏹 Bowman</button>
            <button class="class-btn" onclick="UI.draftUnit('horseman')">♞ Horseman</button>
            <div id="draft-list" style="display:flex; justify-content:center; margin:15px 0;">
                <div id="slot-0" style="width:40px; height:40px; border:1px solid #ccc; margin:5px;"></div>
                <div id="slot-1" style="width:40px; height:40px; border:1px solid #ccc; margin:5px;"></div>
                <div id="slot-2" style="width:40px; height:40px; border:1px solid #ccc; margin:5px;"></div>
                <div id="slot-3" style="width:40px; height:40px; border:1px solid #ccc; margin:5px;"></div>
            </div>
            <button id="btn-start" class="abtn" style="background:#00ffcc; color:#000" disabled onclick="ENGINE.startBattle()">START BATTLE</button>
        </div>
    </div>

    <div id="ui-layer" class="hidden">Status: <span id="g-stat">IDLE</span></div>
    <div id="turn-overlay" class="overlay hidden"><h2>ENEMY THINKING...</h2></div>
    
    <div id="p-stay" class="pad"><button class="abtn" style="background:#ffcc00" id="b-stay">STAY</button></div>
    <div id="p-conf" class="pad"><button class="abtn" style="background:#00cc44" id="b-ok">MOVE</button><button class="abtn" style="background:#ff3333" id="b-can">X</button></div>
    <div id="p-act" class="pad"><button class="abtn" style="background:#ff0055" id="b-atk">ATTACK</button><button class="abtn" style="background:#333" id="b-wat">WAIT</button></div>

<script>
    /* --- ENGINE UPGRADES ---
       1. Capped Pixel Ratio: Forces 1.5x max to save A10 battery/GPU.
       2. Precise Rotation: Uses 0.001 epsilon for snap-to-grid rotation.
       3. UI Throttling: Only updates visible HTML bars to save CPU.
    */

    const CONFIG = {
        gridX: 10, gridZ: 16, tileSize: 1.0, walkSpeed: 5.0,
        classes: {
            'infantry': { sign: '⚔️', move: 3, range: 1, hp: 1000, color: 0x2ea32e },
            'bowman':   { sign: '🏹', move: 3, range: 3, hp: 800,  color: 0xd93838 },
            'horseman': { sign: '♞', move: 5, range: 1, hp: 1200, color: 0x333333 }
        }
    };

    const STATE = {
        phase: 'START', units: [], mapData: [], activeUnit: null,
        hlGroup: new THREE.Group(), faceGroup: new THREE.Group(), tgtGroup: new THREE.Group(), clock: new THREE.Clock()
    };

    const UI = {
        playerDraft: [],
        initDraft: () => { document.getElementById('enemy-draft').innerText = "ENEMY DETECTED"; },
        draftUnit: (t) => {
            if(UI.playerDraft.length < 4) {
                document.getElementById(`slot-${UI.playerDraft.length}`).innerText = CONFIG.classes[t].sign;
                UI.playerDraft.push(t);
                if(UI.playerDraft.length === 4) document.getElementById('btn-start').disabled = false;
            }
        },
        setPad: (id, show) => { document.getElementById(id).style.display = show ? 'flex' : 'none'; },
        toScreenPosition: (vec) => {
            let v = vec.clone().project(ENGINE.camera);
            return { x: (v.x * 0.5 + 0.5) * window.innerWidth, y: -(v.y * 0.5 - 0.5) * window.innerHeight };
        }
    };

    const ENGINE = {
        scene: new THREE.Scene(),
        camera: new THREE.PerspectiveCamera(45, window.innerWidth/window.innerHeight, 0.1, 1000),
        renderer: new THREE.WebGLRenderer({ antialias: false }), // Antialias OFF for performance
        
        init: function() {
            this.renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.5));
            this.renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(this.renderer.domElement);
            this.scene.background = new THREE.Color('#87CEEB');
            this.camera.position.set(10, 15, 10);
            
            this.controls = new THREE.OrbitControls(this.camera, this.renderer.domElement);
            this.controls.maxDistance = 25;
            
            const amb = new THREE.AmbientLight(0xffffff, 0.8); this.scene.add(amb);
            this.scene.add(STATE.hlGroup); this.scene.add(STATE.faceGroup);

            // Map Gen
            const tGeo = new THREE.BoxGeometry(0.95, 0.1, 0.95);
            const tMat = new THREE.MeshLambertMaterial({ color: 0xcccccc, transparent:true, opacity:0.1 });
            for(let x=0; x<10; x++) {
                STATE.mapData[x] = [];
                for(let z=0; z<16; z++) {
                    let t = new THREE.Mesh(tGeo, tMat);
                    t.position.set(x - 4.5, 0, z - 7.5);
                    t.userData = { x, z };
                    this.scene.add(t);
                    STATE.mapData[x][z] = t;
                }
            }
            this.render();
        },

        startBattle: function() {
            document.getElementById('draft-screen').className = 'hidden';
            UI.playerDraft.forEach((t, i) => this.spawn(t, i+3, 14, 'player', i));
            STATE.phase = 'IDLE';
        },

        spawn: function(type, x, z, team, id) {
            const cls = CONFIG.classes[type];
            const mesh = new THREE.Mesh(new THREE.BoxGeometry(0.6, 0.6, 0.6), new THREE.MeshLambertMaterial({color: cls.color}));
            mesh.position.copy(STATE.mapData[x][z].position); mesh.position.y = 0.4;
            this.scene.add(mesh);

            let ui = document.createElement('div'); ui.className = 'f-ui';
            ui.innerHTML = `<div class="bar-bg"><div class="bar-hp" id="hp-${id}"></div></div>`;
            document.body.appendChild(ui);

            let u = { id, type, tm: team, hp: cls.hp, mHp: cls.hp, x, z, m: mesh, ui };
            STATE.mapData[x][z].userData.occ = u;
            STATE.units.push(u);
        },

        render: function() {
            requestAnimationFrame(() => ENGINE.render());
            ENGINE.renderer.render(ENGINE.scene, ENGINE.camera);
            
            // Optimized UI Tracking
            STATE.units.forEach(u => {
                let p = UI.toScreenPosition(u.m.position.clone().add(new THREE.Vector3(0, 0.8, 0)));
                u.ui.style.left = p.x + 'px'; u.ui.style.top = p.y + 'px';
            });
        }
    };

    window.onload = () => { ENGINE.init(); UI.initDraft(); };

    // Register Service Worker for PWA
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js').then(() => console.log("PWA Active"));
    }
</script>
</body>
</html>
